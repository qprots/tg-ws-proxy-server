version: '3'

services:
  tg-ws-proxy:
    build: .
    container_name: tg-ws-proxy
    restart: always
    network_mode: host
    environment:
      TG_WS_PROXY_HOST: "127.0.0.1"
      TG_WS_PROXY_PORT: "10080"
      TG_WS_PROXY_DC_IPS: "1:149.154.167.220 2:149.154.167.220 3:149.154.167.220 4:149.154.167.220 5:149.154.167.220"
      #CF_DOMAIN: "tox-chat.online"
      #CF_IP: "104.21.36.99"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redsocks:
    build:
      context: .
      dockerfile: Dockerfile.redsocks
    container_name: tg-ws-redsocks
    restart: always
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - tg-ws-proxy
