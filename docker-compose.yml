version: '3'

services:
  tg-ws-proxy:
    build: .
    container_name: tg-ws-proxy
    restart: always
    network_mode: host
    environment:
      TG_WS_PROXY_HOST: "0.0.0.0"
      TG_WS_PROXY_PORT: "10080"
      TG_WS_PROXY_DC_IPS: "2:149.154.167.220 4:149.154.167.220"

  redsocks:
    build:
      context: .
      dockerfile: Dockerfile.redsocks
    container_name: tg-ws-redsocks
    restart: always
    network_mode: host
    depends_on:
      - tg-ws-proxy
